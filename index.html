<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Pod request access landing page</title>
</head>
<body>

  <div class="main-content">
    <div class="container">
      <div class="left">
        <div class="content">
          <img src="./assets/desktop/logo.svg" alt="" class="img-top-logo">

          <div class="description">

            <h2>PUBLISH YOUR PODCASTS <span>EVERYWHERE.</span></h2>

            <p>
              Upload your audio to Pod with a single click. We’ll then distribute your podcast to Spotify, 
              Apple Podcasts, Google Podcasts, Pocket Casts and more!
            </p>

            <div class="form">
              <form action="#" novalidate>
                <div class="input-group">
                  <input type="email" placeholder="Email Address" id="email" name="email" autocomplete="email" class="form-input" required>
                  <button type="submit" class="form-btn">Request Access</button>
                </div>
              </form>
            </div>

            <div class="logos">
              <img src="./assets/desktop/spotify.svg" alt="">
              <img src="./assets/desktop/apple-podcast.svg" alt="">
              <img src="./assets/desktop/google-podcasts.svg" alt="">
              <img src="./assets/desktop/pocket-casts.svg" alt="">
            </div>
          </div>
        </div>
      </div>

      <div class="right">
        <img src="./assets/desktop/image-host.jpg" alt="" class="host-img">
        <img src="./assets/desktop/bg-pattern-dots.svg" alt="" class="img-dots">
      </div>
        
    </div>
  </div>

  <!--

  Request access -->

  <script src="script.js"></script>
</body>
</html>
